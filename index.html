<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoOS Remote App Builder</title>
    <style>
        :root {
            --bg-main: #0f172a; --bg-card: #1e293b; --border-color: #334155;
            --text-main: #f8fafc; --text-muted: #94a3b8; --accent: #38bdf8;
            --success: #2da44e; --error: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main); color: var(--text-main);
            margin: 0; padding: 3rem 1rem; display: flex; justify-content: center;
        }
        .container {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 500px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        h1 { margin-top: 0; color: var(--accent); font-size: 1.5rem; text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid var(--border-color);
            background: var(--bg-main); color: var(--text-main); font-size: 1rem; outline: none; box-sizing: border-box;
        }
        input[type="text"]:focus, input[type="password"]:focus { border-color: var(--accent); }
        input[type="file"] {
            width: 100%; padding: 0.5rem; background: var(--bg-main); border: 1px dashed var(--border-color);
            border-radius: 6px; color: var(--text-muted); cursor: pointer; box-sizing: border-box;
        }
        .btn-submit {
            width: 100%; background: var(--accent); color: #000; font-weight: 600; font-size: 1rem;
            padding: 0.75rem; border: none; border-radius: 6px; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { background: var(--border-color); color: var(--text-muted); cursor: not-allowed; }
        #status { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; font-weight: 500; }
        .success { color: var(--success); } .error { color: var(--error); }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 NeoOS Remote Builder</h1>
        
        <div class="form-group">
            <label for="gh-token">GitHub Personal Access Token (NEOTOKEN)</label>
            <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx..." required>
        </div>

        <div class="form-group">
            <label for="app-folder">App-Ordner in 'neoos-apps'</label>
            <input type="text" id="app-folder" placeholder="z.B. apps/com.neoos.app.neocast" value="apps/com.neoos.app.neocast" required>
        </div>

        <div class="form-group">
            <label for="icon-upload">Neues Release-Icon (PNG)</label>
            <input type="file" id="icon-upload" accept="image/png" required>
        </div>

        <button id="submit-btn" class="btn-submit" onclick="startRemoteBuild()">Remote Build starten</button>
        <div id="status"></div>
    </div>

    <script>
        const GH_OWNER = "NeoOS-TV";
        const CONTROL_REPO = "mr-yaml";
        const WORKFLOW_NAME = "build_webos.yml";

        async function startRemoteBuild() {
            const token = document.getElementById('gh-token').value.trim();
            const appFolder = document.getElementById('app-folder').value.trim();
            const fileInput = document.getElementById('icon-upload');
            const btn = document.getElementById('submit-btn');
            const statusBox = document.getElementById('status');

            if (!token || !appFolder || fileInput.files.length === 0) {
                statusBox.innerHTML = "<span class='error'>Bitte fülle alle Felder aus!</span>";
                return;
            }

            btn.disabled = true;
            statusBox.innerHTML = "⏳ Erstelle temporäre Datei in mr-yaml...";

            try {
                const file = fileInput.files[0];
                const base64Icon = await toBase64(file);

                // 1. Hole SHA der Datei, falls sie bereits existiert (wichtig für Überschreiben)
                let sha = null;
                const fileCheck = await fetch(`https://api.github.com/repos/${GH_OWNER}/${CONTROL_REPO}/contents/tmp_upload_icon.png`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2026-03-10' }
                });
                if (fileCheck.ok) {
                    const fileData = await fileCheck.json();
                    sha = fileData.sha;
                }

                // 2. Icon als temporäre Datei ins mr-yaml hochladen
                const uploadRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${CONTROL_REPO}/contents/tmp_upload_icon.png`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github+json',
                        'X-GitHub-Api-Version': '2026-03-10',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "chore: Temporäres Icon für Build hochgeladen",
                        content: base64Icon,
                        sha: sha
                    })
                });

                if (!uploadRes.ok) {
                    throw new Error("Fehler beim Upload des temporären Icons.");
                }

                statusBox.innerHTML = "🚀 Starte Workflow-Pipeline...";

                // 3. Workflow mit den neuen API-Standards triggern
                const response = await fetch(`https://api.github.com/repos/${GH_OWNER}/${CONTROL_REPO}/actions/workflows/${WORKFLOW_NAME}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github+json',
                        'X-GitHub-Api-Version': '2026-03-10',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: { app_folder: appFolder }
                    })
                });

                if (response.ok) {
                    statusBox.innerHTML = "<span class='success'>✅ Temporäre Datei erstellt & Pipeline gestartet! Prüfe GitHub Actions.</span>";
                } else {
                    const errData = await response.json();
                    statusBox.innerHTML = `<span class='error'>❌ Fehler beim Starten: ${errData.message}</span>`;
                }
            } catch (error) {
                statusBox.innerHTML = `<span class='error'>❌ Systemfehler: ${error.message}</span>`;
            } finally {
                btn.disabled = false;
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });
    </script>
</body>
</html>
